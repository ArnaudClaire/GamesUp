spring.application.name=gamesUP

server.port=${SERVER_PORT:8080}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:3306/GamesUP}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

gamesup.recommendation-api.url=${RECOMMENDATION_API_URL:http://localhost:8000}
gamesup.seed-data.enabled=${SEED_DATA_ENABLED:true}
